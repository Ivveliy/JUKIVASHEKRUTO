<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollow Knight RPG - Лист персонажа</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1><i class="fas fa-bug"></i> Hollow Knight RPG - Лист персонажа</h1>
                <input type="text" id="character-name" placeholder="Имя персонажа">
            </div>
            <div class="header-controls">
                <div class="profile-selector">
                    <div class="profile-row">
                        <button class="profile-btn" data-profile="1" title="Профиль 1"><i class="fas fa-user"></i> 1</button>
                        <button class="profile-btn" data-profile="2" title="Профиль 2"><i class="fas fa-user"></i> 2</button>
                        <button class="profile-btn" data-profile="3" title="Профиль 3"><i class="fas fa-user"></i> 3</button>
                    </div>
                    <div class="profile-row">
                        <button class="profile-btn" data-profile="4" title="Профиль 4"><i class="fas fa-user"></i> 4</button>
                        <button class="profile-btn" data-profile="5" title="Профиль 5"><i class="fas fa-user"></i> 5</button>
                        <button class="profile-btn" data-profile="6" title="Профиль 6"><i class="fas fa-user"></i> 6</button>
                    </div>
                </div>
                <button id="centerActionsBtn" class="btn" title="Центрировать меню действий"><i class="fas fa-compress-arrows-alt"></i> Действия</button>
                <button id="exportBtn" class="btn"><i class="fas fa-download"></i> Экспорт JSON</button>
                <button id="importBtn" class="btn"><i class="fas fa-upload"></i> Импорт JSON</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </header>

        <div class="blocks-container" id="blocksContainer">
            <!-- Блоки будут динамически добавляться здесь -->
        </div>

        <div class="actions-panel" id="actionsPanel">
            <div class="actions-header" id="actionsHeader">
                <h3><i class="fas fa-bolt"></i> Действия</h3>
                <button class="toggle-panel"><i class="fas fa-chevron-down"></i></button>
            </div>
            <div class="actions-content" id="actionsContent">
                <button id="restBtn" class="action-btn rest-btn"><i class="fas fa-bed"></i> Отдых</button>
                <button id="endRoundBtn" class="action-btn endround-btn"><i class="fas fa-hourglass-end"></i> Начало раунда</button>
                <div class="action-separator"></div>
                <button id="blockOrderBtn" class="action-btn order-btn"><i class="fas fa-sort"></i> Порядок блоков</button>
                <button id="saveBtn" class="action-btn save-btn"><i class="fas fa-save"></i> Сохранить</button>
                <button id="resetBtn" class="action-btn reset-btn"><i class="fas fa-redo"></i> Сбросить</button>
            </div>
        </div>
    </div>

    <!-- Модальные окна будут добавляться динамически -->

    <script src="js/code.js?v=2"></script>
    <script src="js/characteristics.js?v=2"></script>
    <script src="js/statuses.js?v=2"></script>
    <script src="js/traits.js?v=2"></script>
    <script src="js/equipment.js?v=2"></script>
    <script src="js/nonCombatSkills.js?v=2"></script>
    <script src="js/combatSkills.js?v=2"></script>
    <script src="js/paths.js?v=2"></script>
    <script src="js/charms.js?v=2"></script>
    <script src="js/advancements.js?v=2"></script>
    <script src="js/actions.js?v=2"></script>
</body>
</html>
